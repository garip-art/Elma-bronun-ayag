<!DOCTYPE html>
<html lang="tr">
<head>

<title>Elma Bronun Ayağı</title>

<style>
body{
    margin:0;
    background:linear-gradient(135deg,#111,#222,#000);
    color:white;
    font-family:Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    text-align:center;
}
h1{
    font-size:50px;
    color:#00ff88;
    text-shadow:0 0 15px #00ff88;
}
p{
    font-size:20px;
    color:#ddd;

.box{
    padding:40px;
    border:2px solid #00ff88;
    border-radius:20px;
    box-shadow:0 0 20px #00ff88;

button{
    margin-top:20px;
    padding:12px 25px;
    font-size:18px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:#00ff88;
}
button:hover{
    transform:scale(1.05);
}
</style>
</head>

<body>

<div class="box">
<h1>🍎 Elma Bronun Ayağı 🍎</h1>

</html>
